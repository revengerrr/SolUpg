name: sdk

on:
  push:
    branches: [main]
    paths:
      - "sdk/typescript/**"
      - ".github/workflows/sdk.yml"
  pull_request:
    paths:
      - "sdk/typescript/**"
      - ".github/workflows/sdk.yml"
  workflow_dispatch:

env:
  NODE_VERSION: 20

jobs:
  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: npm ci
        run: npm ci || npm install

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test (vitest)
        run: npm test
