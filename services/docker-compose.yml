# SolUPG full-stack compose.
#
# Usage:
#   docker compose build               # builds all 5 services from shared Dockerfile
#   docker compose up -d               # starts infra + services
#   docker compose up -d postgres redis  # infra only (legacy Phase 1–5 dev loop)
#
# Env overrides live in .env (not committed). See .env.example if present.

services:
  postgres:
    image: postgres:16-alpine
    container_name: solupg-postgres
    environment:
      POSTGRES_USER: solupg
      POSTGRES_PASSWORD: solupg_dev
      POSTGRES_DB: solupg
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solupg -d solupg"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - solupg-net

  redis:
    image: redis:7-alpine
    container_name: solupg-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - solupg-net

  # ---------------------------------------------------------------------------
  # Rust services — all built from the shared services/Dockerfile with
  # SERVICE arg. The first build is slow; subsequent builds share the
  # cargo-chef cook layer.
  # ---------------------------------------------------------------------------

  routing-engine:
    container_name: solupg-routing-engine
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: routing-engine
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      directory-service:
        condition: service_started
    environment:
      RUST_LOG: info,routing_engine=debug
      DATABASE_URL: postgres://solupg:solupg_dev@postgres:5432/solupg
      REDIS_URL: redis://redis:6379
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-http://host.docker.internal:8899}
      DIRECTORY_SERVICE_URL: http://directory-service:3001
      ROUTING_ENGINE_PORT: "3000"
      PORT: "3000"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - solupg-net

  directory-service:
    container_name: solupg-directory-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: directory-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RUST_LOG: info,directory_service=debug
      DATABASE_URL: postgres://solupg:solupg_dev@postgres:5432/solupg
      REDIS_URL: redis://redis:6379
      DIRECTORY_SERVICE_PORT: "3001"
      PORT: "3001"
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - solupg-net

  api-gateway:
    container_name: solupg-api-gateway
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: api-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      routing-engine:
        condition: service_started
      directory-service:
        condition: service_started
    environment:
      RUST_LOG: info,api_gateway=debug
      DATABASE_URL: postgres://solupg:solupg_dev@postgres:5432/solupg
      REDIS_URL: redis://redis:6379
      ROUTING_ENGINE_URL: http://routing-engine:3000
      DIRECTORY_SERVICE_URL: http://directory-service:3001
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      API_GATEWAY_PORT: "3002"
      PORT: "3002"
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3002/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - solupg-net

  clearing-engine:
    container_name: solupg-clearing-engine
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: clearing-engine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUST_LOG: info,clearing_engine=debug
      DATABASE_URL: postgres://solupg:solupg_dev@postgres:5432/solupg
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-http://host.docker.internal:8899}
      HOST: "0.0.0.0"
      PORT: "3003"
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3003/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - solupg-net

  monitoring:
    container_name: solupg-monitoring
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: monitoring
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUST_LOG: info,monitoring=debug
      DATABASE_URL: postgres://solupg:solupg_dev@postgres:5432/solupg
      HOST: "0.0.0.0"
      PORT: "3004"
    ports:
      - "3004:3004"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3004/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - solupg-net

volumes:
  pgdata:

networks:
  solupg-net:
    driver: bridge
